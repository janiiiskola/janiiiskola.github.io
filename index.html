<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing</title>
    <link rel="stylesheet" href="src/styles.css">
</head>
<body>
    <div class="container">
        <h1>Email Validator</h1>
        <div class="form-group">
            <label for="email">Enter your email:</label>
            <input
                type="email"
                id="email"
                name="email"
                placeholder="example@email.com"
                autocomplete="email"
            >
            <div id="validation-message" class="validation-message"></div>
        </div>
    </div>
    <script>
        class EmailValidator {
            static EMAIL_REGEX = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            static validate(email) {
                if (!email || email.trim() === '') {
                    return {
                        isValid: false,
                        message: 'Email is required'
                    };
                }

                const trimmedEmail = email.trim();
                const isValid = this.EMAIL_REGEX.test(trimmedEmail);

                return {
                    isValid,
                    message: isValid ? 'Valid email address' : 'Invalid email format'
                };
            }
        }

        class EmailValidatorApp {
            constructor() {
                this.emailInput = document.getElementById('email');
                this.validationMessage = document.getElementById('validation-message');

                if (!this.emailInput || !this.validationMessage) {
                    throw new Error('Required DOM elements not found');
                }

                this.setupEventListeners();
            }

            setupEventListeners() {
                this.emailInput.addEventListener('input', this.handleEmailInput.bind(this));
                this.emailInput.addEventListener('blur', this.handleEmailInput.bind(this));
            }

            handleEmailInput() {
                const email = this.emailInput.value;
                const result = EmailValidator.validate(email);

                this.updateUI(result.isValid, result.message);
            }

            updateUI(isValid, message) {
                this.emailInput.className = isValid ? 'valid' : 'invalid';
                this.validationMessage.textContent = message;
                this.validationMessage.className = `validation-message ${isValid ? 'valid' : 'invalid'}`;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new EmailValidatorApp();
        });
    </script>
</body>
</html>
